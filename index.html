<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Bela e a Fera</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; min-height:100vh;
  background:#080508;
  display:flex; align-items:center; justify-content:center;
  overflow-x:hidden; overflow-y:auto;
  cursor:pointer;
  font-family:'Cormorant Garamond', serif;
}

.bg {
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 100%, rgba(80,10,20,0.8) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(40,5,15,0.5) 0%, transparent 70%),
    #060306;
  z-index:0;
}

canvas#stars { position:fixed; inset:0; z-index:1; pointer-events:none; }



.gdot {
  position:fixed; border-radius:50%; background:#e0b84a; z-index:2; pointer-events:none;
  animation:gdotAnim var(--td) ease-in-out infinite var(--tdd);
}
@keyframes gdotAnim { 0%,100%{opacity:0.08;transform:scale(1)} 50%{opacity:0.55;transform:scale(1.8)} }

.scene {
  position:relative; z-index:3;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh;
  padding:40px 24px 50px;
  text-align:center; gap:0;
  width:100%;
}

/* ── Dome ── */
.dome-wrap {
  opacity:0;
  animation:fadeDown 1.4s cubic-bezier(.22,1,.36,1) forwards 0.3s;
  filter:drop-shadow(0 0 22px rgba(90,200,220,0.35)) drop-shadow(0 0 55px rgba(220,60,80,0.2));
  transition:filter 0.5s, transform 0.4s;
  margin-bottom:28px;
}
.dome-wrap:hover {
  filter:drop-shadow(0 0 38px rgba(100,220,240,0.6)) drop-shadow(0 0 80px rgba(230,80,100,0.4));
  transform:translateY(-6px) scale(1.04);
}
@keyframes fadeDown {
  from { opacity:0; transform:translateY(-24px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Title ── */
.title-wrap {
  opacity:0;
  animation:fadeUp 1.5s cubic-bezier(.22,1,.36,1) forwards 1s;
  width:100%;
  max-width:600px;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}

.t-bela {
  font-family:'Great Vibes', cursive;
  font-size:clamp(32px, 8vw, 62px);
  line-height:1.15;
  display:block;
  padding:0 8px;
  background:linear-gradient(160deg, #ff9090 0%, #e81828 20%, #c00010 45%, #e82030 60%, #ff7070 75%, #c00018 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 3px 12px rgba(200,0,20,0.6));
}

.t-and-stack {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  line-height:1;
  margin-right:4px;
}

.t-e, .t-a {
  font-family:'Great Vibes', cursive;
  font-size:clamp(13px, 3.5vw, 24px);
  color:#c8b8c0;
  display:block;
  opacity:0.85;
  line-height:1.1;
}

.t-bottom-row {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.t-fera {
  font-family:'Cinzel', serif;
  font-weight:900;
  font-size:clamp(30px, 8vw, 58px);
  display:block;
  line-height:1.1;
  letter-spacing:0.05em;
  padding:0 8px;
  background:linear-gradient(180deg, #d8d0d8 0%, #a898a8 20%, #887888 40%, #a098a0 60%, #786878 80%, #b0a0b0 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 3px 14px rgba(80,40,80,0.7));
}

.divider {
  display:flex; align-items:center; gap:12px;
  margin:20px 0 18px;
  opacity:0;
  animation:fadeUp 1s ease forwards 1.9s;
}
.divider-line { width:55px; height:0.5px; background:linear-gradient(to right,transparent,#b87030,transparent); }
.divider-dot  { font-size:8px; color:#b87030; letter-spacing:0.2em; }

.love-text {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-weight:300;
  font-size:clamp(15px,3.8vw,23px);
  color:#e8c8b8;
  letter-spacing:0.05em; line-height:1.8;
  opacity:0;
  animation:fadeUp 1.2s ease forwards 2.1s;
}

.eyebrow {
  font-family:'Cormorant Garamond',serif;
  font-size:10px; letter-spacing:0.5em;
  color:#a07030; text-transform:uppercase;
  margin-bottom:14px;
  opacity:0;
  animation:fadeUp 1s ease forwards 0.5s;
}

.cta {
  margin-top:28px;
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:11px;
  letter-spacing:0.4em; color:rgba(190,130,50,0.4);
  text-transform:uppercase;
  opacity:0;
  animation:fadeUp 1s ease forwards 2.7s, breathe 3s ease-in-out infinite 3s;
}
@keyframes breathe { 0%,100%{opacity:0.3} 50%{opacity:0.7} }

.spark { position:fixed; border-radius:50%; pointer-events:none; z-index:9; animation:sparkOut 0.9s ease-out forwards; }
@keyframes sparkOut {
  0%   { transform:translate(0,0) scale(1.4); opacity:1; }
  100% { transform:translate(var(--sx),var(--sy)) scale(0); opacity:0; }
}
</style>
</head>
<body>

<div class="bg"></div>
<canvas id="stars"></canvas>
<div id="gdots"></div>

<div class="scene" id="scene">

  <!-- DOME -->
  <div class="dome-wrap">
    <svg width="160" height="220" viewBox="0 0 210 290" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="glassBody" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#a8dce8" stop-opacity="0.38"/>
          <stop offset="18%"  stop-color="#d8f4fc" stop-opacity="0.18"/>
          <stop offset="50%"  stop-color="#ecf9ff" stop-opacity="0.07"/>
          <stop offset="82%"  stop-color="#c0e8f4" stop-opacity="0.16"/>
          <stop offset="100%" stop-color="#88cce0" stop-opacity="0.30"/>
        </linearGradient>
        <radialGradient id="roseAura" cx="50%" cy="55%" r="48%">
          <stop offset="0%"  stop-color="#ff8090" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <radialGradient id="groundGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#f0e890" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#d0c060" stop-opacity="0.1"/>
        </radialGradient>
        <linearGradient id="tealG" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#7ee0f0"/>
          <stop offset="50%"  stop-color="#40c0d8"/>
          <stop offset="100%" stop-color="#28a8c0"/>
        </linearGradient>
        <radialGradient id="capGrad" cx="35%" cy="25%" r="60%">
          <stop offset="0%"  stop-color="#80d8e8"/>
          <stop offset="100%" stop-color="#2898b8"/>
        </radialGradient>
        <radialGradient id="heartGrad" cx="40%" cy="30%" r="60%">
          <stop offset="0%"  stop-color="#ff8090"/>
          <stop offset="100%" stop-color="#c00820"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="softGlow">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="domeClip">
          <path d="M24,268 L24,115 Q24,24 105,24 Q186,24 186,115 L186,268 Z"/>
        </clipPath>
      </defs>

      <!-- inner rose glow -->
      <ellipse cx="105" cy="175" rx="64" ry="72" fill="url(#roseAura)" clip-path="url(#domeClip)"/>

      <!-- 🌹 emoji rose via foreignObject, clipped inside dome -->
      <foreignObject x="22" y="95" width="166" height="166" clip-path="url(#domeClip)">
        <div xmlns="http://www.w3.org/1999/xhtml"
             style="width:166px;height:166px;display:flex;align-items:center;justify-content:center;font-size:118px;line-height:1;user-select:none;pointer-events:none;">
          🌹
        </div>
      </foreignObject>

      <!-- sparkle 4-point stars outside dome -->
      <g transform="translate(182,88)" fill="#50cce0">
        <polygon points="0,-12 2.4,-2.4 12,0 2.4,2.4 0,12 -2.4,2.4 -12,0 -2.4,-2.4" opacity="0.9">
          <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.8s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="scale" values="1;1.25;1" dur="1.8s" repeatCount="indefinite"/>
        </polygon>
      </g>
      <g transform="translate(20,182)" fill="#50cce0">
        <polygon points="0,-9 1.8,-1.8 9,0 1.8,1.8 0,9 -1.8,1.8 -9,0 -1.8,-1.8" opacity="0.85">
          <animate attributeName="opacity" values="0.85;0.18;0.85" dur="2.4s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="2.4s" repeatCount="indefinite"/>
        </polygon>
      </g>
      <g transform="translate(194,52)" fill="#50cce0">
        <polygon points="0,-5 1,-1 5,0 1,1 0,5 -1,1 -5,0 -1,-1" opacity="0.7">
          <animate attributeName="opacity" values="0.7;0.15;0.7" dur="1.5s" repeatCount="indefinite"/>
        </polygon>
      </g>

      <!-- DOME GLASS (drawn over rose for glass effect) -->
      <path d="M24,268 L24,115 Q24,24 105,24 Q186,24 186,115 L186,268 Z"
            fill="url(#glassBody)"
            stroke="url(#tealG)" stroke-width="5"
            filter="url(#softGlow)"/>

      <!-- glass shine -->
      <path d="M40,100 Q45,50 72,36 L66,32 Q38,48 36,103 Z" fill="white" fill-opacity="0.22"/>
      <path d="M40,130 Q41,113 49,105 L45,103 Q39,112 37,132 Z" fill="white" fill-opacity="0.15"/>

      <!-- CAP -->
      <ellipse cx="105" cy="30" rx="36" ry="13" fill="url(#capGrad)" stroke="url(#tealG)" stroke-width="3"/>
      <ellipse cx="105" cy="24" rx="36" ry="9"  fill="url(#capGrad)" stroke="url(#tealG)" stroke-width="2.5"/>
      <ellipse cx="93"  cy="20" rx="11" ry="4"  fill="white" fill-opacity="0.32" transform="rotate(-10,93,20)"/>

      <!-- HEART -->
      <g transform="translate(105,7)" filter="url(#glow)">
        <path d="M0,6 C0,2 -5,-3 -9,0 C-13,3 -9,9 0,16 C9,9 13,3 9,0 C5,-3 0,2 0,6 Z"
              fill="url(#heartGrad)" stroke="#a00010" stroke-width="0.8"/>
        <ellipse cx="-3" cy="3" rx="2.5" ry="1.5" fill="white" fill-opacity="0.38" transform="rotate(-30,-3,3)"/>
        <animate attributeName="opacity" values="1;0.75;1" dur="1.4s" repeatCount="indefinite"/>
      </g>

      <!-- ══ DOME FLAT BASE (bottom closing plate) ══ -->
      <!-- solid floor that closes the dome at the bottom -->
      <rect x="24" y="262" width="162" height="16" rx="0"
            fill="#1e7898" stroke="url(#tealG)" stroke-width="0"/>
      <!-- top rim of base — connects flush with dome walls -->
      <rect x="20" y="260" width="170" height="14" rx="3"
            fill="#1a6888" stroke="#50c8e0" stroke-width="3"/>
      <!-- inner highlight on base top -->
      <rect x="28" y="262" width="154" height="5" rx="2"
            fill="white" fill-opacity="0.12"/>
      <!-- bottom edge of base (slight depth) -->
      <rect x="20" y="271" width="170" height="6" rx="2"
            fill="#135570"/>
      <!-- shadow beneath -->
      <ellipse cx="105" cy="280" rx="82" ry="6" fill="black" fill-opacity="0.28"/>
    </svg>
  </div>

  <!-- TITLE -->
  <div class="title-wrap">
    <span class="t-bela">A Bela</span>
    <div class="t-bottom-row">
      <span class="t-fera">FERA</span>
    </div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-dot">✦ ✦ ✦</span>
    <div class="divider-line"></div>
  </div>

  <div class="love-text">
    Você é a minha Bela,<br>
    e eu sempre serei a sua Fera
  </div>

  <div class="cta">✦ toque para abrir ✦</div>
</div>

<script>
/* ── Starfield ── */
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];
function resizeCanvas() {
  canvas.width = innerWidth; canvas.height = innerHeight;
  stars = Array.from({length:220}, () => ({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    r: Math.random()*1.6+0.2,
    speed: 0.25+Math.random()*0.65,
    phase: Math.random()*Math.PI*2
  }));
}
function drawStars(t) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s => {
    const a = 0.08+0.72*(0.5+0.5*Math.sin(t*s.speed+s.phase));
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,245,215,${a})`; ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
requestAnimationFrame(drawStars);

/* ── Gold dots ── */
const gd = document.getElementById('gdots');
for(let i=0;i<22;i++){
  const d=document.createElement('div'); d.className='gdot';
  const sz=1.5+Math.random()*3;
  d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--td:${1.5+Math.random()*3.5}s;--tdd:${Math.random()*3}s`;
  gd.appendChild(d);
}

/* ── Click ── */
document.getElementById('scene').addEventListener('click', e => {
  for(let i=0;i<22;i++){
    const sp=document.createElement('div'); sp.className='spark';
    const angle=(i/22)*Math.PI*2, dist=42+Math.random()*72;
    sp.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:${3+Math.random()*5}px;height:${3+Math.random()*5}px;background:${Math.random()>.5?'#f8d060':'#e03040'};--sx:${Math.cos(angle)*dist}px;--sy:${Math.sin(angle)*dist}px`;
    document.body.appendChild(sp);
    sp.addEventListener('animationend',()=>sp.remove());
  }

  setTimeout(()=>{
    // Overlay escuro
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:999;display:flex;align-items:center;justify-content:center;cursor:default;';

    // Elemento de vídeo
    const video = document.createElement('video');
    video.src = 'movie.mp4';
    video.style.cssText = 'width:100%;height:100%;object-fit:contain;';
    video.controls = true;
    video.autoplay = true;

    // Botão fechar
    const closeBtn = document.createElement('button');
    closeBtn.textContent = '✕';
    closeBtn.style.cssText = 'position:absolute;top:16px;right:20px;background:rgba(255,255,255,0.15);border:none;color:white;font-size:22px;width:44px;height:44px;border-radius:50%;cursor:pointer;z-index:1000;';
    closeBtn.onclick = () => {
      video.pause();
      document.exitFullscreen && document.exitFullscreen();
      overlay.remove();
    };

    overlay.appendChild(video);
    overlay.appendChild(closeBtn);
    document.body.appendChild(overlay);

    // Pedir tela cheia
    video.play().then(() => {
      if(video.requestFullscreen) video.requestFullscreen();
      else if(video.webkitRequestFullscreen) video.webkitRequestFullscreen();
    }).catch(()=>{
      if(overlay.requestFullscreen) overlay.requestFullscreen();
      else if(overlay.webkitRequestFullscreen) overlay.webkitRequestFullscreen();
    });

    // Fechar overlay ao terminar o vídeo
    video.addEventListener('ended', () => {
      document.exitFullscreen && document.exitFullscreen();
      overlay.remove();
    });
  }, 350);
});
</script>
</body>
</html>
